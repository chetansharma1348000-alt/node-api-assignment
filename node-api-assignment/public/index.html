<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>User Registration</title>

    <link
        rel="stylesheet"
        href="/css/style.css"
    >
</head>

<body>

    <div class="container">

        <h1>User Registration Form</h1>

        <form id="userForm">

            <!-- First Name -->
            <div class="form-group">

                <label for="firstName">
                    First Name
                </label>

                <input
                    type="text"
                    id="firstName"
                    placeholder="Enter first name"
                    pattern="[A-Za-z ]+"
                    title="First Name should contain letters only"
                    required
                >

            </div>


            <!-- Last Name -->
            <div class="form-group">

                <label for="lastName">
                    Last Name
                </label>

                <input
                    type="text"
                    id="lastName"
                    placeholder="Enter last name"
                    pattern="[A-Za-z ]+"
                    title="Last Name should contain letters only"
                    required
                >

            </div>


            <!-- Mobile -->
            <div class="form-group">

                <label for="mobile">
                    Mobile Number
                </label>

                <input
                    type="text"
                    id="mobile"
                    placeholder="Enter 10 digit mobile number"
                    maxlength="10"
                    pattern="[0-9]{10}"
                    title="Mobile Number must be exactly 10 digits"
                    required
                >

            </div>


            <!-- Email -->
            <div class="form-group">

                <label for="email">
                    Email
                </label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter email address"
                    required
                >

            </div>


            <h3>Address</h3>


            <!-- Street -->
            <div class="form-group">

                <label for="street">
                    Street
                </label>

                <input
                    type="text"
                    id="street"
                    placeholder="Enter street"
                    required
                >

            </div>


            <!-- City -->
            <div class="form-group">

                <label for="city">
                    City
                </label>

                <input
                    type="text"
                    id="city"
                    placeholder="Enter city"
                    pattern="[A-Za-z ]+"
                    title="City should contain letters only"
                    required
                >

            </div>


            <!-- State -->
            <div class="form-group">

                <label for="state">
                    State
                </label>

                <input
                    type="text"
                    id="state"
                    placeholder="Enter state"
                    pattern="[A-Za-z ]+"
                    title="State should contain letters only"
                    required
                >

            </div>


            <!-- Country -->
            <div class="form-group">

                <label for="country">
                    Country
                </label>

                <input
                    type="text"
                    id="country"
                    placeholder="Enter country"
                    pattern="[A-Za-z ]+"
                    title="Country should contain letters only"
                    required
                >

            </div>


            <!-- Login ID -->
            <div class="form-group">

                <label for="loginId">
                    Login ID
                </label>

                <input
                    type="text"
                    id="loginId"
                    placeholder="Example: chetan12"
                    minlength="8"
                    maxlength="8"
                    pattern="[A-Za-z0-9]{8}"
                    title="Login ID must be exactly 8 alphanumeric characters"
                    required
                >

                <small>
                    Login ID must be exactly 8 alphanumeric characters.
                </small>

            </div>


            <!-- Password -->
            <div class="form-group">

                <label for="password">
                    Password
                </label>

                <input
                    type="password"
                    id="password"
                    placeholder="Enter password"
                    minlength="6"
                    required
                >

                <small>
                    Password must contain at least:
                    <br>
                    • 1 Uppercase Letter
                    <br>
                    • 1 Lowercase Letter
                    <br>
                    • 1 Special Character
                </small>

            </div>


            <!-- Submit -->
            <button type="submit">
                Save User
            </button>

        </form>


        <!-- Success / Error Message -->
        <div id="message"></div>

    </div>


    <!-- jQuery -->
    <script
        src="https://code.jquery.com/jquery-3.7.1.min.js">
    </script>


    <!-- Registration JavaScript -->
    <script
        src="/js/form.js">
    </script>

</body>

</html>
